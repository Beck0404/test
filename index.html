<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>寵物食品包裝校稿系統</title>
    <style>
      body { margin: 0; background: #f5f0e8; color: #1f2937; font-family: 'Noto Sans TC', sans-serif; }
      .container { max-width: 980px; margin: 0 auto; padding: 24px 16px 40px; }
      h1 { margin: 0 0 8px; font-size: 28px; color: #1a3318; }
      .muted { color: #6b7280; margin-bottom: 16px; }
      .card { background: #fff; border-radius: 12px; box-shadow: 0 2px 10px rgba(0,0,0,.08); padding: 16px; margin-bottom: 14px; }
      .card h2 { margin: 0 0 10px; font-size: 18px; color: #1a3318; }
      .grid { display: grid; gap: 10px; grid-template-columns: repeat(auto-fill, minmax(140px,1fr)); margin-top: 12px; }
      .thumb { margin: 0; background: #f8fafc; border-radius: 8px; overflow: hidden; border: 1px solid #e5e7eb; }
      .thumb img { width: 100%; height: 100px; object-fit: cover; display: block; }
      .thumb figcaption { font-size: 12px; padding: 6px 8px; color: #4b5563; }
      pre { white-space: pre-wrap; word-break: break-word; font-size: 12px; line-height: 1.6; background: #f8fafc; border-radius: 8px; padding: 10px; }
      .error { color: #dc2626; font-weight: 600; }
      .actions { margin-top: 12px; }
      button { border: none; border-radius: 8px; padding: 6px 10px; cursor: pointer; }
      .primary { background: #2d5a27; color: #fff; font-weight: 700; }
      .danger { background: #dc2626; color: #fff; font-size: 11px; margin-left: 8px; padding: 3px 6px; }
      .ghost { background: #e5e7eb; color: #1f2937; font-size: 11px; margin-left: 8px; padding: 3px 6px; }
      .groupCard { border: 1px solid #e5e7eb; border-radius: 10px; padding: 10px; margin-bottom: 10px; }
      .groupHead { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 8px; }
      .groupHead input { border: 1px solid #d1d5db; border-radius: 6px; padding: 4px 8px; }
      .thumb.selected { border-color: #4a8c41; }
      .ok { color: #166534; font-weight: 600; }
      .resultCard { border: 1px solid #e5e7eb; border-radius: 10px; padding: 10px; margin-bottom: 10px; background: #fff; }
      .resultCard h3 { margin: 0 0 8px; color: #1a3318; }
      .resultCard p { margin: 6px 0; }
      .resultCard ul { margin: 6px 0 0 18px; }

    </style>

    <!-- Runtime dependencies for App.jsx -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  </head>
  <body>
    <div id="root"></div>

    <!-- Load JSX file directly via Babel -->
    <script type="text/babel" data-presets="react" src="./App.jsx"></script>
    <script type="text/babel" data-presets="react">
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
  </body>
</html>
